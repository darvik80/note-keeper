server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: note-keeper
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlite}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

# Application configuration
app:
  storage:
    base-dir: ${user.dir}/.data
    attachments-dir: ${app.storage.base-dir}/attachments
    backups-dir: ${app.storage.base-dir}/backups
    data-dir: ${app.storage.base-dir}
    db-path: ${app.storage.data-dir}/notekeeper.db
  encryption:
    # AES-256 key (Base64 encoded). Set APP_ENCRYPTION_KEY in production.
    key: ${APP_ENCRYPTION_KEY:}

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRY_MS:86400000}

# Common configuration (applies to all profiles)
mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: xyz.crearts.note.keeper.model
  type-handlers-package: xyz.crearts.note.keeper.mapper.typehandler
  configuration:
    map-underscore-to-camel-case: true

#logging:
#  level:
#    xyz.crearts.note.keeper: DEBUG

# SQLite profile (default)
---
spring:
  config:
    activate:
      on-profile: sqlite
  datasource:
    url: jdbc:sqlite:${app.storage.db-path}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA foreign_keys=OFF; PRAGMA journal_mode=WAL;"
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# PostgreSQL profile
---
spring:
  config:
    activate:
      on-profile: postgresql
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notekeeper}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  sql:
    init:
      mode: always
      platform: postgresql

logging:
  level:
    xyz.crearts.note.keeper.mapper: DEBUG
    org.apache.ibatis.logging.jdbc: TRACE
