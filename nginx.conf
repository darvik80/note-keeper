server {
    listen 80;
    server_name note-keeper.local; # Или ваш домен/IP-адрес Synology

    # Максимальный размер загружаемого файла (например, для картинок или вложений)
    client_max_body_size 50M;

    # Главный локейшн, который перенаправляет трафик в контейнер
    location / {
        # Куда перенаправляем. Если Nginx живет на том же NAS:
        # Можно использовать http://localhost:TARGET_PORT или имя контейнера, если они в одной сети.
        proxy_pass http://127.0.0.1:8080;

        # --- ОБЯЗАТЕЛЬНЫЕ ЗАГОЛОВКИ ДЛЯ REVERSE PROXY ---

        # Передаем оригинальный хост (чтобы Spring Boot знал, по какому домену к нему обратились)
        proxy_set_header Host $host;

        # Передаем реальный IP-адрес клиента (иначе в логах Java всегда будет 127.0.0.1)
        proxy_set_header X-Real-IP $remote_addr;

        # Передаем цепочку прокси-серверов, если их несколько
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Передаем протокол (http или https), чтобы Spring правильно строил редиректы
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- ПОДДЕРЖКА WEBSOCKET / SSE (на будущее) ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # --- ТАЙМАУТЫ (чтобы долгие запросы Java не отваливались по 504 Gateway Timeout) ---
        proxy_connect_timeout       90;
        proxy_send_timeout          90;
        proxy_read_timeout          90;
        proxy_buffer_size           16k;
        proxy_buffers               32 4k;
        proxy_busy_buffers_size     64k;
    }
}