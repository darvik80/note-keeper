name: Unit Tests

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Install web module (builds frontend)
        run: mvn install -pl note-keeper-web -DskipTests -B

      - name: Run service unit tests
        run: mvn test -pl note-keeper-service -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: note-keeper-service/target/surefire-reports/
          retention-days: 7
