openapi: 3.0.3
info:
  title: NoteKeeper API
  description: |
    Open-source Evernote alternative with powerful features for notes and todos management.
    
    ## Features
    - **Notes Management**: Create, read, update, delete notes with Markdown & Mermaid support
    - **Todos Management**: Manage todos with descriptions, tags, priorities, and schedules
    - **Folder Structure**: Organize notes in folders and subfolders
    - **Tags & Priorities**: Categorize and prioritize your content
    - **Encryption**: Secure sensitive notes
    - **Reminders**: Set reminders for notes and todos
    - **Archive & Trash**: Archive old items and restore from trash
    - **Templates**: Create notes from predefined templates
    - **History**: Track note changes with version history
    - **Search**: Full-text search with saved queries
    - **Calendar**: Visualize todos with deadlines
    - **Analytics**: Productivity graphs and statistics
    - **Shortcuts**: Keyboard shortcuts for quick actions
    - **Integrations**: Send notifications to Telegram, DingTalk, and Email
  version: 3.0.0
  contact:
    name: NoteKeeper Support
    email: support@notekeeper.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3001/api/v1
    description: Development server
  - url: https://api.notekeeper.example.com/v1
    description: Production server

tags:
  - name: Notes
    description: Notes management endpoints
  - name: Todos
    description: Todos management endpoints
  - name: Templates
    description: Note templates management
  - name: Search
    description: Search and saved queries
  - name: Analytics
    description: Statistics and analytics
  - name: Integrations
    description: Third-party integrations

paths:
  /notes:
    get:
      tags:
        - Notes
      summary: Get all notes
      description: Retrieve a list of all notes with optional filtering
      operationId: getNotes
      parameters:
        - name: folder
          in: query
          description: Filter by folder name
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag
          schema:
            type: string
        - name: priority
          in: query
          description: Filter by priority level
          schema:
            type: string
            enum: [low, medium, high]
        - name: isFavorite
          in: query
          description: Filter by favorite status
          schema:
            type: boolean
        - name: isEncrypted
          in: query
          description: Filter by encryption status
          schema:
            type: boolean
        - name: isArchived
          in: query
          description: Filter by archive status
          schema:
            type: boolean
        - name: isDeleted
          in: query
          description: Filter by deletion status
          schema:
            type: boolean
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Notes
      summary: Create a new note
      description: Create a new note with title, content, and metadata
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteInput'
      responses:
        '201':
          description: Note created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}:
    get:
      tags:
        - Notes
      summary: Get note by ID
      description: Retrieve a specific note by its ID
      operationId: getNoteById
      parameters:
        - name: id
          in: path
          required: true
          description: Note ID
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Notes
      summary: Update note
      description: Update an existing note
      operationId: updateNote
      parameters:
        - name: id
          in: path
          required: true
          description: Note ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteInput'
      responses:
        '200':
          description: Note updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Notes
      summary: Delete note (move to trash)
      description: Soft delete a note by moving it to trash
      operationId: deleteNote
      parameters:
        - name: id
          in: path
          required: true
          description: Note ID
          schema:
            type: string
        - name: permanent
          in: query
          description: Permanently delete without moving to trash
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Note deleted successfully
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}/archive:
    post:
      tags:
        - Notes
      summary: Archive note
      description: Move note to archive
      operationId: archiveNote
      parameters:
        - name: id
          in: path
          required: true
          description: Note ID
          schema:
            type: string
      responses:
        '200':
          description: Note archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}/restore:
    post:
      tags:
        - Notes
      summary: Restore note
      description: Restore note from trash or archive
      operationId: restoreNote
      parameters:
        - name: id
          in: path
          required: true
          description: Note ID
          schema:
            type: string
      responses:
        '200':
          description: Note restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}/history:
    get:
      tags:
        - Notes
      summary: Get note history
      description: Retrieve version history for a note
      operationId: getNoteHistory
      parameters:
        - name: id
          in: path
          required: true
          description: Note ID
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoteHistory'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/import:
    post:
      tags:
        - Notes
      summary: Import note from file
      description: Import a note from MD, PDF, DOC, DOCX, XLS, or CSV file
      operationId: importNote
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File to import (MD, PDF, DOC, DOCX, XLS, CSV)
                folder:
                  type: string
                  description: Target folder for imported note
                subfolder:
                  type: string
                  description: Target subfolder for imported note
      responses:
        '201':
          description: Note imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid file format or input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /todos:
    get:
      tags:
        - Todos
      summary: Get all todos
      description: Retrieve a list of all todos with optional filtering
      operationId: getTodos
      parameters:
        - name: completed
          in: query
          description: Filter by completion status
          schema:
            type: boolean
        - name: tag
          in: query
          description: Filter by tag
          schema:
            type: string
        - name: priority
          in: query
          description: Filter by priority level
          schema:
            type: string
            enum: [low, medium, high]
        - name: isFavorite
          in: query
          description: Filter by favorite status
          schema:
            type: boolean
        - name: isArchived
          in: query
          description: Filter by archive status
          schema:
            type: boolean
        - name: isDeleted
          in: query
          description: Filter by deletion status
          schema:
            type: boolean
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Todos
      summary: Create a new todo
      description: Create a new todo with title, description, and metadata
      operationId: createTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '201':
          description: Todo created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /todos/{id}:
    get:
      tags:
        - Todos
      summary: Get todo by ID
      description: Retrieve a specific todo by its ID
      operationId: getTodoById
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Todos
      summary: Update todo
      description: Update an existing todo
      operationId: updateTodo
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '200':
          description: Todo updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Todos
      summary: Delete todo (move to trash)
      description: Soft delete a todo by moving it to trash
      operationId: deleteTodo
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: string
        - name: permanent
          in: query
          description: Permanently delete without moving to trash
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Todo deleted successfully
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /todos/{id}/archive:
    post:
      tags:
        - Todos
      summary: Archive todo
      description: Move todo to archive
      operationId: archiveTodo
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: string
      responses:
        '200':
          description: Todo archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /todos/{id}/restore:
    post:
      tags:
        - Todos
      summary: Restore todo
      description: Restore todo from trash or archive
      operationId: restoreTodo
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: string
      responses:
        '200':
          description: Todo restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /templates:
    get:
      tags:
        - Templates
      summary: Get all templates
      description: Retrieve a list of all note templates
      operationId: getTemplates
      parameters:
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoteTemplate'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Templates
      summary: Create a new template
      description: Create a new note template
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteTemplateInput'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteTemplate'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /templates/{id}:
    get:
      tags:
        - Templates
      summary: Get template by ID
      description: Retrieve a specific template by its ID
      operationId: getTemplateById
      parameters:
        - name: id
          in: path
          required: true
          description: Template ID
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteTemplate'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Templates
      summary: Delete template
      description: Delete a template by ID
      operationId: deleteTemplate
      parameters:
        - name: id
          in: path
          required: true
          description: Template ID
          schema:
            type: string
      responses:
        '204':
          description: Template deleted successfully
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    get:
      tags:
        - Search
      summary: Search notes and todos
      description: Full-text search across notes and todos
      operationId: search
      parameters:
        - name: query
          in: query
          required: true
          description: Search query string
          schema:
            type: string
        - name: type
          in: query
          description: Filter by type
          schema:
            type: string
            enum: [all, notes, todos]
            default: all
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          schema:
            type: string
        - name: priority
          in: query
          description: Filter by priority
          schema:
            type: string
            enum: [low, medium, high]
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  notes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                  todos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Todo'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search/queries:
    get:
      tags:
        - Search
      summary: Get saved queries
      description: Retrieve all saved search queries
      operationId: getSavedQueries
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavedQuery'

    post:
      tags:
        - Search
      summary: Save a search query
      description: Save a search query for later use
      operationId: saveQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedQueryInput'
      responses:
        '201':
          description: Query saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedQuery'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search/queries/{id}:
    delete:
      tags:
        - Search
      summary: Delete saved query
      description: Delete a saved search query
      operationId: deleteSavedQuery
      parameters:
        - name: id
          in: path
          required: true
          description: Query ID
          schema:
            type: string
      responses:
        '204':
          description: Query deleted successfully
        '404':
          description: Query not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /analytics:
    get:
      tags:
        - Analytics
      summary: Get analytics data
      description: Retrieve productivity statistics and analytics
      operationId: getAnalytics
      parameters:
        - name: timeRange
          in: query
          description: Time range for analytics
          schema:
            type: string
            enum: [week, month, year]
            default: week
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  notesCreated:
                    type: integer
                    example: 25
                  todosCreated:
                    type: integer
                    example: 40
                  todosCompleted:
                    type: integer
                    example: 32
                  completionRate:
                    type: number
                    format: float
                    example: 80.0
                  topTags:
                    type: array
                    items:
                      type: object
                      properties:
                        tag:
                          type: string
                        count:
                          type: integer
                  priorityDistribution:
                    type: object
                    properties:
                      high:
                        type: integer
                      medium:
                        type: integer
                      low:
                        type: integer
                  dailyActivity:
                    type: array
                    items:
                      type: integer

  /integrations/telegram:
    post:
      tags:
        - Integrations
      summary: Send notification to Telegram
      description: Send a notification message to configured Telegram bot
      operationId: sendToTelegram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Message to send
                  example: "New note created: Project Meeting Notes"
                botToken:
                  type: string
                  description: Telegram bot token (optional if configured in settings)
                chatId:
                  type: string
                  description: Telegram chat ID (optional if configured in settings)
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Message sent to Telegram"
        '400':
          description: Invalid input or missing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/dingtalk:
    post:
      tags:
        - Integrations
      summary: Send notification to DingTalk
      description: Send a notification message to configured DingTalk webhook
      operationId: sendToDingTalk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Message to send
                  example: "Reminder: Complete project documentation"
                webhook:
                  type: string
                  description: DingTalk webhook URL (optional if configured in settings)
                secret:
                  type: string
                  description: DingTalk secret (optional if configured in settings)
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Message sent to DingTalk"
        '400':
          description: Invalid input or missing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/email:
    post:
      tags:
        - Integrations
      summary: Send email notification
      description: Send a notification email via configured SMTP
      operationId: sendEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subject
                - message
              properties:
                subject:
                  type: string
                  description: Email subject
                  example: "NoteKeeper Reminder"
                message:
                  type: string
                  description: Email message body
                  example: "You have 3 todos due today"
                to:
                  type: string
                  description: Recipient email (optional if configured in settings)
                  example: "user@example.com"
      responses:
        '200':
          description: Email sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Email sent successfully"
        '400':
          description: Invalid input or missing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Attachment:
      type: object
      required:
        - id
        - name
        - size
        - type
        - url
        - uploadedAt
      properties:
        id:
          type: string
          description: Unique identifier
          example: "att_1234567890"
        name:
          type: string
          description: File name
          example: "document.pdf"
        size:
          type: integer
          description: File size in bytes
          example: 1048576
        type:
          type: string
          description: MIME type
          example: "application/pdf"
        url:
          type: string
          description: File URL or path
          example: "/uploads/document.pdf"
        uploadedAt:
          type: string
          format: date-time
          description: Upload timestamp
          example: "2026-04-13T10:00:00Z"

    NoteHistory:
      type: object
      required:
        - id
        - content
        - timestamp
        - action
      properties:
        id:
          type: string
          description: History entry ID
          example: "hist_1234567890"
        content:
          type: string
          description: Note content at this version
          example: "# Meeting Notes\n\nDiscussed project timeline."
        timestamp:
